spring.application.name=transtrack-backend-EN3350
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/trans_track
spring.datasource.username=root
#spring.datasource.password=${SQL_PW:__MISSING__}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads
py.infer.base=http://localhost:8000
app.server.public-base=http://localhost:8080

# where to store batch files & lock
py.train.batch-dir=training_batches
py.train.lock=ai_logic/_training.lock

# python / module / weights (tweak as needed)
py.train.python=python
py.train.module=ai_logic.train
py.train.from-weights=ai_logic/best.pt
py.train.out=tf_model/weights/updated_defect/best2.pt

# threshold
py.train.batch-size=50

# optional: your uploads root to resolve image_path
app.upload.dir=uploads